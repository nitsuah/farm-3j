services:
  farm-dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && corepack pnpm install --frozen-lockfile && pnpm run dev"
    ports:
      - "3001:3000"
    volumes:
      - ..:/app
      - farm_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000

volumes:
  farm_node_modules:
