# Dependabot configuration for automatic dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Enable version updates for npm (JavaScript/TypeScript projects)
  # Security updates are automatically handled by Dependabot
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    ignore:
      # Mitigated via pnpm patchedDependencies in package.json + pnpm-lock.yaml.
      # Dependabot cannot resolve this transitive path to 5.x yet due upstream constraints.
      - dependency-name: 'brace-expansion'
        versions:
          - '<5.0.5'
    open-pull-requests-limit: 10
    reviewers:
      - 'nitsuah'
    assignees:
      - 'nitsuah'
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(deps)'

  # Enable version updates for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    reviewers:
      - 'nitsuah'
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'chore(ci)'
