name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  checks: write
  statuses: write

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Enable Corepack and pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm --version

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        shell: bash
        run: |
          if ! pnpm install --frozen-lockfile; then
            echo "::warning::Frozen lockfile install failed – repairing with pnpm install --no-frozen-lockfile"
            pnpm install --no-frozen-lockfile
          fi

      - name: Diagnose environment on failure
        if: failure()
        shell: bash
        run: |
          echo "=== Node / pnpm versions ==="
          node --version
          corepack --version || echo "corepack unavailable"
          pnpm --version || echo "pnpm unavailable"
          echo "=== GitHub connectivity ==="
          curl -s --max-time 10 -o /dev/null -w "github.com HTTP %{http_code}\n" https://github.com || echo "github.com unreachable"
          curl -s --max-time 10 -o /dev/null -w "registry.npmjs.org HTTP %{http_code}\n" https://registry.npmjs.org || echo "npm registry unreachable"
          echo "=== pnpm store path ==="
          pnpm store path || true
          echo "=== Lockfile head ==="
          head -20 pnpm-lock.yaml

      - name: Run type check
        run: pnpm run type-check

      - name: Run linter
        run: pnpm run lint

      - name: Run format check
        run: pnpm run format:check

      - name: Run tests
        run: pnpm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v6
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Enable Corepack and pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm --version

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        shell: bash
        run: |
          if ! pnpm install --frozen-lockfile; then
            echo "::warning::Frozen lockfile install failed – repairing with pnpm install --no-frozen-lockfile"
            pnpm install --no-frozen-lockfile
          fi

      - name: Diagnose environment on failure
        if: failure()
        shell: bash
        run: |
          echo "=== Node / pnpm versions ==="
          node --version
          corepack --version || echo "corepack unavailable"
          pnpm --version || echo "pnpm unavailable"
          echo "=== GitHub connectivity ==="
          curl -s --max-time 10 -o /dev/null -w "github.com HTTP %{http_code}\n" https://github.com || echo "github.com unreachable"
          curl -s --max-time 10 -o /dev/null -w "registry.npmjs.org HTTP %{http_code}\n" https://registry.npmjs.org || echo "npm registry unreachable"
          echo "=== pnpm store path ==="
          pnpm store path || true
          echo "=== Lockfile head ==="
          head -20 pnpm-lock.yaml

      - name: Build application
        run: pnpm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: .next
          retention-days: 7
